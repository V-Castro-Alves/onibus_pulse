services:
  test:
    build:
      context: ./onibus_pulse_backend
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.
    volumes:
      - ./onibus_pulse_backend:/app
    command: >
      sh -c "ruff check . && ruff format --check . && bandit -r . -x ./tests,./venv && pip-audit && pytest"
