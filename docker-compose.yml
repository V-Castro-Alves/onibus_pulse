services:
  backend:
    build:
      context: ./onibus_pulse_backend
    container_name: onibus_pulse_backend
    ports:
      - "8000:8000"
    volumes:
      - ./onibus_pulse_backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  frontend:
    build:
      context: ./onibus_pulse_frontend
    container_name: onibus_pulse_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
